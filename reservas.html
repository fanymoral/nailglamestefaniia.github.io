<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nail Glam Estefania — Reservar Cita</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FFF8FB; --blush: #F2C4D8; --rose: #E8829F;
    --dark-rose: #C45C7A; --espresso: #3A1A28;
    --warm-gray: #A8848E; --light-gray: #F7EBF0; --gold: #D4A853; --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--espresso); min-height: 100vh; }
  header { background: var(--espresso); color: var(--cream); text-align: center; padding: 2.5rem 1rem 2rem; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(201,137,110,0.25) 0%, transparent 70%); }
  .salon-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 300; letter-spacing: 0.12em; position: relative; }
  .salon-name span { font-style: italic; color: var(--blush); }
  .header-sub { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-top: 0.4rem; position: relative; }
  .nail-divider { display: flex; align-items: center; justify-content: center; gap: 0.8rem; margin-top: 1rem; position: relative; }
  .nail-divider::before, .nail-divider::after { content: ''; width: 60px; height: 1px; background: var(--gold); opacity: 0.5; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .steps { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 2.5rem; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
  .step-num { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--light-gray); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 500; color: var(--warm-gray); background: var(--white); transition: all 0.3s; }
  .step.active .step-num { background: var(--rose); border-color: var(--rose); color: var(--white); }
  .step.done .step-num { background: var(--dark-rose); border-color: var(--dark-rose); color: var(--white); }
  .step-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warm-gray); white-space: nowrap; }
  .step.active .step-label { color: var(--rose); }
  .step-line { width: clamp(30px, 8vw, 60px); height: 1px; background: var(--light-gray); margin-bottom: 1.2rem; }
  .card { background: var(--white); border-radius: 16px; padding: 2rem; box-shadow: 0 2px 20px rgba(42,26,20,0.07); margin-bottom: 1.5rem; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 1.2rem; color: var(--espresso); }
  .card-title small { display: block; font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: var(--warm-gray); letter-spacing: 0.05em; margin-top: 0.1rem; font-weight: 300; }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .service-btn { border: 1.5px solid var(--light-gray); border-radius: 12px; padding: 1.2rem 1rem; cursor: pointer; background: var(--cream); text-align: left; transition: all 0.25s; position: relative; width: 100%; }
  .service-btn:hover { border-color: var(--blush); background: #FFF6FA; }
  .service-btn.selected { border-color: var(--rose); background: #FFF4F8; }
  .service-btn.selected::after { content: '✓'; position: absolute; top: 10px; right: 12px; color: var(--rose); font-size: 0.9rem; }
  .service-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; color: var(--espresso); margin-bottom: 0.2rem; }
  .service-detail { font-size: 0.72rem; color: var(--warm-gray); line-height: 1.4; }
  .service-price { margin-top: 0.6rem; font-size: 0.9rem; font-weight: 500; color: var(--rose); }
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .month-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; text-transform: capitalize; }
  .nav-btn { background: none; border: 1.5px solid var(--light-gray); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 1rem; color: var(--espresso); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .nav-btn:hover { border-color: var(--rose); color: var(--rose); }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name { text-align: center; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warm-gray); padding: 0.4rem 0; }
  .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent; }
  .cal-day:hover:not(.empty):not(.past) { background: var(--light-gray); }
  .cal-day.empty { cursor: default; }
  .cal-day.past { color: #CCC; cursor: not-allowed; }
  .cal-day.selected { background: var(--rose); color: var(--white); border-color: var(--rose); font-weight: 500; }
  .cal-day.today:not(.selected) { border-color: var(--blush); }
  .cal-day.blocked { color: #CCC; cursor: not-allowed; text-decoration: line-through; }
  .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 0.6rem; margin-top: 1rem; }
  .slot-btn { border: 1.5px solid var(--light-gray); border-radius: 8px; padding: 0.55rem 0.4rem; text-align: center; font-size: 0.82rem; cursor: pointer; background: var(--cream); color: var(--espresso); transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .slot-btn:hover:not(.taken) { border-color: var(--blush); }
  .slot-btn.selected { background: var(--rose); border-color: var(--rose); color: var(--white); font-weight: 500; }
  .slot-btn.taken { background: var(--light-gray); color: #BBB; cursor: not-allowed; text-decoration: line-through; font-size: 0.75rem; }
  .no-slots { text-align: center; color: var(--warm-gray); font-size: 0.85rem; padding: 1rem; font-style: italic; }
  .form-row { margin-bottom: 1.2rem; }
  .form-label { display: block; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 0.4rem; }
  .form-input { width: 100%; border: 1.5px solid var(--light-gray); border-radius: 10px; padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--espresso); background: var(--cream); transition: border-color 0.2s; outline: none; }
  .form-input:focus { border-color: var(--rose); }
  .form-input::placeholder { color: #C5B8B2; }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .summary-block { background: var(--cream); border-radius: 12px; padding: 1.2rem 1.4rem; margin-bottom: 1.2rem; }
  .summary-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.4rem 0; font-size: 0.88rem; }
  .summary-row:not(:last-child) { border-bottom: 1px solid var(--light-gray); }
  .sum-label { color: var(--warm-gray); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .sum-value { font-weight: 500; text-align: right; }
  .btn-primary { width: 100%; padding: 1rem; background: var(--espresso); color: var(--cream); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; letter-spacing: 0.08em; cursor: pointer; transition: all 0.25s; font-weight: 500; }
  .btn-primary:hover { background: var(--dark-rose); }
  .btn-primary:disabled { background: #CCC; cursor: not-allowed; }
  .btn-secondary { background: none; border: 1.5px solid var(--light-gray); border-radius: 12px; padding: 0.75rem 1.5rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--warm-gray); transition: all 0.2s; margin-top: 0.8rem; width: 100%; }
  .btn-secondary:hover { border-color: var(--rose); color: var(--rose); }
  .success-screen { text-align: center; padding: 2rem 1rem; }
  .success-icon { width: 80px; height: 80px; background: linear-gradient(135deg, var(--blush), var(--rose)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem; }
  .success-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; margin-bottom: 0.5rem; }
  .success-sub { color: var(--warm-gray); font-size: 0.88rem; line-height: 1.6; }
  .whatsapp-btn { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem; padding: 0.85rem 1.8rem; background: #25D366; color: white; border-radius: 12px; text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: opacity 0.2s; }
  .whatsapp-btn:hover { opacity: 0.9; }
  .info-banner { background: linear-gradient(135deg, #FFF4F8, #FFE8F2); border: 1px solid var(--blush); border-radius: 10px; padding: 0.8rem 1rem; font-size: 0.78rem; color: var(--dark-rose); margin-top: 1rem; line-height: 1.5; }
  .loading-overlay { position: fixed; inset: 0; background: rgba(250,246,241,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--light-gray); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 480px) { .services-grid { grid-template-columns: 1fr; } .card { padding: 1.4rem; } }
</style>
</head>
<body>
<header>
  <div class="salon-name">Nail Glam <span>Estefania</span></div>
  <div class="header-sub">Reserva tu cita online</div>
  <div class="nail-divider"><span>💅</span></div>
</header>
<main>
  <div class="steps" id="stepsBar">
    <div class="step active" data-step="1"><div class="step-num">1</div><div class="step-label">Servicio</div></div>
    <div class="step-line"></div>
    <div class="step" data-step="2"><div class="step-num">2</div><div class="step-label">Fecha</div></div>
    <div class="step-line"></div>
    <div class="step" data-step="3"><div class="step-num">3</div><div class="step-label">Datos</div></div>
    <div class="step-line"></div>
    <div class="step" data-step="4"><div class="step-num">4</div><div class="step-label">Confirmar</div></div>
  </div>
  <div id="app"></div>
</main>

<script>
// Script URL removed
var WHATSAPP = "34672574200";
var SHEETDB_URL = "https://sheetdb.io/api/v1/atytsrud05pw3"; // ← Cambia por tu número

var CONFIG = {
  maxAdvanceDays: 60,
  schedule: {
    0: [],
    1: [[960,1230]],
    2: [[540,660],[960,1230]],
    3: [[600,780],[960,1230]],
    4: [[540,660],[960,1230]],
    5: [[600,780],[960,1230]],
    6: []
  },
  services: [
    {id:"semi",     name:"Semipermanente",           desc:"Esmaltado de larga duración",                duration:60,  price:"20€"},
    {id:"gel",      name:"Refuerzo con Gel",          desc:"Fortalecimiento con gel para uñas naturales",duration:60,  price:"22€"},
    {id:"acrigel",  name:"Acrigel",                   desc:"Uñas esculpidas con acrigel",               duration:90,  price:"28€"},
    {id:"pies",     name:"Pies",                      desc:"Tratamiento y esmaltado de pies",           duration:30,  price:"18€"},
    {id:"deco",     name:"Decoración todas las uñas", desc:"Nail art en todas las uñas",                duration:30,  price:"6€"},
    {id:"ret-semi", name:"Retirada Semipermanente",   desc:"Retirada segura del esmalte semipermanente",duration:30,  price:"7€"},
    {id:"ret-acri", name:"Retirada Acrigel",          desc:"Retirada completa de acrigel",              duration:30,  price:"10€"}
  ]
};

var state = {
  step:1, services:[], date:null, time:null,
  name:'', phone:'', notes:'',
  month: new Date().getMonth(), year: new Date().getFullYear(),
  bookedSlots: [], blockedDays: [], loading: false
};

// Cargar citas y días bloqueados desde Google Sheets
function loadData(cb) {
  showLoading(true);
  fetch(SHEETDB_URL+'?sheet=Citas')
    .then(function(r){ return r.json(); })
    .then(function(citas) {
      state.bookedSlots = (citas || []).filter(function(c){ return c.Estado !== 'cancelada'; });
      return fetch(SHEETDB_URL+'?sheet=Bloqueados');
    })
    .then(function(r){ return r.json(); })
    .then(function(bloqueados) {
      state.blockedDays = (bloqueados || []).map(function(b){ return b.Fecha || b.fecha || ''; }).filter(Boolean);
      showLoading(false);
      if (cb) cb();
    })
    .catch(function(){ showLoading(false); if (cb) cb(); });
}

function showLoading(show) {
  var el = document.getElementById('loadingOverlay');
  if (show && !el) {
    var div = document.createElement('div');
    div.id = 'loadingOverlay';
    div.className = 'loading-overlay';
    div.innerHTML = '<div class="spinner"></div><div style="color:var(--warm-gray);font-size:0.85rem">Un momento...</div>';
    document.body.appendChild(div);
  } else if (!show && el) {
    el.remove();
  }
}

function pad(n){ return String(n).padStart(2,'0'); }
function formatDate(d) {
  var days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return days[d.getDay()]+', '+d.getDate()+' de '+months[d.getMonth()]+' de '+d.getFullYear();
}
function isSlotTaken(dateStr, timeStr) {
  return state.bookedSlots.some(function(b){ return b.Fecha===dateStr && b.Hora===timeStr; });
}
function isDayBlocked(dateStr) {
  return state.blockedDays.indexOf(dateStr) >= 0;
}
function isDayOpen(dow){ return (CONFIG.schedule[dow]||[]).length > 0; }
function getSlots(dateStr, dur) {
  var slots=[], dow=new Date(dateStr+'T12:00:00').getDay(), ranges=CONFIG.schedule[dow]||[];
  for (var r=0;r<ranges.length;r++) {
    var cur=ranges[r][0], end=ranges[r][1];
    while (cur+dur<=end) {
      var t=pad(Math.floor(cur/60))+':'+pad(cur%60);
      slots.push({time:t, taken:isSlotTaken(dateStr,t)});
      cur+=dur;
    }
  }
  return slots;
}

function render() {
  document.querySelectorAll('.step').forEach(function(el){
    var s=parseInt(el.dataset.step);
    el.className='step'+(s===state.step?' active':'')+(s<state.step?' done':'');
  });
  var app=document.getElementById('app');
  if (state.step===1) app.innerHTML=renderStep1();
  else if (state.step===2) app.innerHTML=renderStep2();
  else if (state.step===3) app.innerHTML=renderStep3();
  else if (state.step===4) app.innerHTML=renderStep4();
  else app.innerHTML=renderSuccess();
  bind();
}

function renderStep1() {
  var btns=CONFIG.services.map(function(s){
    var sel=state.services.some(function(x){return x.id===s.id;})?' selected':'';
    return '<button class="service-btn'+sel+'" data-sid="'+s.id+'"><div class="service-name">'+s.name+'</div><div class="service-detail">'+s.desc+' · '+s.duration+' min</div><div class="service-price">'+s.price+'</div></button>';
  }).join('');
  var totalDur = state.services.reduce(function(a,s){return a+s.duration;},0);
  var totalPrice = state.services.map(function(s){return s.price;}).join(' + ');
  var summaryHtml = state.services.length > 0
    ? '<div style="margin-top:1rem;background:var(--light-gray);border-radius:10px;padding:0.8rem 1rem;font-size:0.82rem;">'
      +'<strong>Seleccionados:</strong> '+state.services.map(function(s){return s.name;}).join(', ')
      +'<br><strong>Duración total:</strong> '+totalDur+' min &nbsp;·&nbsp; <strong>Total:</strong> '+totalPrice
      +'</div>'
    : '';
  return '<div class="card"><div class="card-title">Elige tus servicios<small>Puedes seleccionar más de uno</small></div><div class="services-grid">'+btns+'</div>'
    +summaryHtml
    +'<div style="margin-top:1.5rem"><button class="btn-primary" id="btn1"'+(state.services.length?'':' disabled')+'>Continuar →</button></div></div>';
}

function renderStep2() {
  var today=new Date(); today.setHours(0,0,0,0);
  var maxD=new Date(today); maxD.setDate(maxD.getDate()+CONFIG.maxAdvanceDays);
  var mNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var dNames=['D','L','M','X','J','V','S'];
  var firstDay=new Date(state.year,state.month,1).getDay();
  var daysInM=new Date(state.year,state.month+1,0).getDate();
  var cells='';
  for (var i=0;i<firstDay;i++) cells+='<div class="cal-day empty"></div>';
  for (var d=1;d<=daysInM;d++) {
    var date=new Date(state.year,state.month,d);
    var ds=state.year+'-'+pad(state.month+1)+'-'+pad(d);
    var blocked=isDayBlocked(ds);
    var unavail=date<today||date>maxD||!isDayOpen(date.getDay())||blocked;
    var cls='cal-day'+(unavail?(blocked?' blocked':' past'):' available');
    if (date.getTime()===today.getTime()) cls+=' today';
    if (state.date===ds) cls+=' selected';
    cells+='<div class="'+cls+'"'+(unavail?'':' data-date="'+ds+'"')+'>'+d+'</div>';
  }
  var slotsHtml='';
  if (state.date) {
    var totalDur=state.services.reduce(function(a,s){return a+s.duration;},0); var slots=getSlots(state.date,totalDur);
    if (!slots.length) {
      slotsHtml='<div class="no-slots">No hay huecos disponibles este día.</div>';
    } else {
      var sBtns=slots.map(function(s){
        if (s.taken) return '<button class="slot-btn taken" disabled>'+s.time+'<br><span style="font-size:0.65rem">Ocupado</span></button>';
        return '<button class="slot-btn'+(state.time===s.time?' selected':'')+'" data-time="'+s.time+'">'+s.time+'</button>';
      }).join('');
      slotsHtml='<div class="card-title" style="margin-top:1.5rem;font-size:1.1rem">Elige la hora</div><div class="slots-grid">'+sBtns+'</div>';
    }
  }
  return '<div class="card"><div class="card-title">Elige tu fecha<small>Días disponibles según tu horario</small></div>'
    +'<div class="calendar-header"><button class="nav-btn" id="prevM">‹</button><div class="month-title">'+mNames[state.month]+' '+state.year+'</div><button class="nav-btn" id="nextM">›</button></div>'
    +'<div class="calendar-grid">'+dNames.map(function(n){return '<div class="cal-day-name">'+n+'</div>';}).join('')+cells+'</div>'
    +slotsHtml
    +'<div style="margin-top:1.5rem"><button class="btn-primary" id="btn2"'+((state.date&&state.time)?'':' disabled')+'>Continuar →</button><button class="btn-secondary" id="back2">← Volver</button></div></div>';
}

function renderStep3() {
  return '<div class="card"><div class="card-title">Tus datos<small>Para confirmar y recordarte la cita</small></div>'
    +'<div class="form-row"><label class="form-label">Nombre y apellidos *</label><input class="form-input" id="iName" type="text" placeholder="Ej: Laura García" value="'+state.name+'" maxlength="60"></div>'
    +'<div class="form-row"><label class="form-label">Teléfono (WhatsApp) *</label><input class="form-input" id="iPhone" type="tel" placeholder="Ej: 612 345 678" value="'+state.phone+'" maxlength="20"></div>'
    +'<div class="form-row"><label class="form-label">¿Algo que deba saber? (opcional)</label><textarea class="form-input" id="iNotes" placeholder="Alergias, preferencias de color...">'+state.notes+'</textarea></div>'
    +'<div class="info-banner"><strong>📱 Confirmación:</strong> Recibirás confirmación por WhatsApp. Puedes cancelar con al menos 24h de antelación.</div>'
    +'<div style="margin-top:1.5rem"><button class="btn-primary" id="btn3">Revisar cita →</button><button class="btn-secondary" id="back3">← Volver</button></div></div>';
}

function renderStep4() {
  var d=new Date(state.date+'T12:00:00');
  var svcNames=state.services.map(function(s){return s.name;}).join(' + ');
  var svcPrices=state.services.map(function(s){return s.price;}).join(' + ');
  var totalDur=state.services.reduce(function(a,s){return a+s.duration;},0);
  var rows=[['Servicios',svcNames],['Precio',svcPrices],['Duración',totalDur+' min'],['Fecha',formatDate(d)],['Hora',state.time],['Nombre',state.name],['Teléfono',state.phone]];
  if (state.notes) rows.push(['Notas',state.notes]);
  return '<div class="card"><div class="card-title">Confirmar cita<small>Revisa los detalles antes de reservar</small></div>'
    +'<div class="summary-block">'+rows.map(function(r){return '<div class="summary-row"><span class="sum-label">'+r[0]+'</span><span class="sum-value">'+r[1]+'</span></div>';}).join('')+'</div>'
    +'<button class="btn-primary" id="btnConfirm">✓ Confirmar reserva</button><button class="btn-secondary" id="back4">← Volver</button></div>';
}

function renderSuccess() {
  var d=new Date(state.date+'T12:00:00');
  var svcNames=state.services.map(function(s){return s.name;}).join(' + ');
  var msg=encodeURIComponent('¡Hola! Acabo de reservar una cita 💅\n\n📋 Servicio: '+svcNames+'\n📅 Fecha: '+formatDate(d)+'\n⏰ Hora: '+state.time+'\n👤 Nombre: '+state.name+'\n📱 Tel: '+state.phone+(state.notes?'\n📝 Notas: '+state.notes:'')+'\n\n¡Nos vemos pronto! ✨');
  return '<div class="card success-screen"><div class="success-icon">✓</div><div class="success-title">¡Reserva confirmada!</div>'
    +'<p class="success-sub">Tu cita ha quedado reservada para el<br><strong>'+formatDate(d)+' a las '+state.time+'</strong><br><br>Te esperamos con mucha ilusión 💅</p>'
    +'<a href="https://wa.me/'+WHATSAPP+'?text='+msg+'" target="_blank" class="whatsapp-btn">💬 Confirmar por WhatsApp</a>'
    +'<button class="btn-secondary" id="btnNew" style="margin-top:1rem">Hacer otra reserva</button></div>';
}

function bind() {
  document.querySelectorAll('.service-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var svc=CONFIG.services.find(function(s){return s.id===btn.dataset.sid;});
      var idx=state.services.findIndex(function(s){return s.id===svc.id;});
      if (idx>=0) state.services.splice(idx,1);
      else state.services.push(svc);
      state.date=null; state.time=null;
      render();
    });
  });
  var b1=document.getElementById('btn1');
  if (b1) b1.addEventListener('click',function(){
    loadData(function(){ state.step=2; render(); });
  });
  var pm=document.getElementById('prevM');
  if (pm) pm.addEventListener('click',function(){ if(state.month===0){state.month=11;state.year--;}else state.month--; render(); });
  var nm=document.getElementById('nextM');
  if (nm) nm.addEventListener('click',function(){ if(state.month===11){state.month=0;state.year++;}else state.month++; render(); });
  document.querySelectorAll('.cal-day[data-date]').forEach(function(el){
    el.addEventListener('click',function(){ state.date=el.dataset.date; state.time=null; render(); });
  });
  document.querySelectorAll('.slot-btn[data-time]').forEach(function(el){
    el.addEventListener('click',function(){ state.time=el.dataset.time; render(); });
  });
  var b2=document.getElementById('btn2');
  if (b2) b2.addEventListener('click',function(){ state.step=3; render(); });
  var bk2=document.getElementById('back2');
  if (bk2) bk2.addEventListener('click',function(){ state.step=1; render(); });
  var b3=document.getElementById('btn3');
  if (b3) b3.addEventListener('click',function(){
    var n=document.getElementById('iName').value.trim();
    var p=document.getElementById('iPhone').value.trim();
    if (!n||!p){ alert('Por favor, rellena tu nombre y teléfono.'); return; }
    state.name=n; state.phone=p; state.notes=document.getElementById('iNotes').value.trim();
    state.step=4; render();
  });
  var bk3=document.getElementById('back3');
  if (bk3) bk3.addEventListener('click',function(){ state.step=2; render(); });
  var bc=document.getElementById('btnConfirm');
  if (bc) bc.addEventListener('click',function(){
    if (isSlotTaken(state.date,state.time)){
      alert('¡Vaya! Alguien acaba de reservar ese horario. Por favor elige otro.');
      state.time=null; state.step=2; render(); return;
    }
    var svcNames=state.services.map(function(s){return s.name;}).join(' + ');
    var svcPrices=state.services.map(function(s){return s.price;}).join(' + ');
    var totalDur=state.services.reduce(function(a,s){return a+s.duration;},0);
    showLoading(true);
    fetch(SHEETDB_URL, {
      method:'POST',
      headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
      body: JSON.stringify({data: {
        ID: Date.now(),
        Fecha: state.date,
        Hora: state.time,
        Servicio: svcNames,
        Precio: svcPrices,
        'Duración': totalDur+' min',
        Nombre: state.name,
        'Teléfono': state.phone,
        Notas: state.notes,
        'Reservada el': new Date().toLocaleString('es-ES'),
        Estado: 'confirmada'
      }})
    })
    .then(function(){ showLoading(false); state.step=5; render(); })
    .catch(function(){ showLoading(false); state.step=5; render(); });
  });
  var bk4=document.getElementById('back4');
  if (bk4) bk4.addEventListener('click',function(){ state.step=3; render(); });
  var bn=document.getElementById('btnNew');
  if (bn) bn.addEventListener('click',function(){
    state.step=1; state.services=[]; state.date=null; state.time=null; state.name=''; state.phone=''; state.notes='';
    render();
  });
}

render();
</script>
</body>
</html>
