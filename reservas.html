  .bn-btn { width:40px; height:40px; border-radius:50%; border:1.5px solid var(--light-gray); background:none; font-size:1.3rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }

  .welcome-modal-text strong { color:var(--espresso); }
  .ig-link { display:inline-flex; align-items:center; gap:0.5rem; margin-top:0.8rem; padding:0.7rem 1.4rem; background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color:white; border-radius:10px; text-decoration:none; font-size:0.82rem; font-weight:500; }
  @media (max-width: 480px) { .services-grid { grid-template-columns: 1fr; } .card { padding: 1.4rem; } }
</style>

<script>

    {id:"deco-basic", name:"Decoración básica",      desc:"Efecto cromado, línea, puntos, degradados, efecto glitter o 3D en una uña",                                                                         duration:0,  price:"2€"},
    {id:"deco-mid",   name:"Decoración media",       desc:"Efecto mármol, flores, líneas geométricas en todas las uñas",                                                                                          duration:0,  price:"3€"},
    {id:"deco-full",  name:"Nail art completo",       desc:"Diseños elaborados a mano, pedrería, perlas, efecto 3D, encapsulado de flores secas, combinación de múltiples técnicas o diseño totalmente personalizado", duration:30, price:"7€"},
    {id:"ret-semi", name:"Retirada Semipermanente",   desc:"Retirada segura del esmalte semipermanente",duration:30,  price:"7€"},
    {id:"ret-acri", name:"Retirada Acrigel",          desc:"Retirada completa de acrigel",              duration:30,  price:"10€"}
  ]
};

var state = {
  step:1, services:[], date:null, time:null,
  name:'', phone:'', notes:'',
  month: new Date().getMonth(), year: new Date().getFullYear(),
  bookedSlots: [], blockedDays: [], loading: false
};

// Cargar citas y días bloqueados desde Google Sheets
function loadData(cb) {
  showLoading(true);
  fetch(SHEETDB_URL+'?sheet=Citas')
    .then(function(r){ return r.json(); })
    .then(function(citas) {
      state.bookedSlots = (citas || []).filter(function(c){ return c.Estado !== 'cancelada'; });
      return fetch(SHEETDB_URL+'?sheet=Bloqueados');
    })
    .then(function(r){ return r.json(); })
    .then(function(bloqueados) {
      state.blockedDays = (bloqueados || []).map(function(b){ return b.Fecha || b.fecha || ''; }).filter(Boolean);
      return fetch(SHEETDB_URL+'?sheet=Horarios');
    })
    .then(function(r){ return r.json(); })
    .then(function(horarios) {
      if (horarios && horarios.length > 0 && horarios[0].Config) {
        try {
          var customSchedule = JSON.parse(horarios[0].Config);
          CONFIG.schedule = customSchedule;
        } catch(e) { /* keep default */ }
      }
      showLoading(false);
      if (cb) cb();
    })
    .catch(function(){ showLoading(false); if (cb) cb(); });
}

function showLoading(show) {
  var el = document.getElementById('loadingOverlay');
  if (show && !el) {
    var div = document.createElement('div');
    div.id = 'loadingOverlay';
    div.className = 'loading-overlay';
    div.innerHTML = '<div class="spinner"></div><div style="color:var(--warm-gray);font-size:0.85rem">Un momento...</div>';
    document.body.appendChild(div);
  } else if (!show && el) {
    el.remove();
  }
}

function pad(n){ return String(n).padStart(2,'0'); }
function formatDate(d) {
  var days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return days[d.getDay()]+', '+d.getDate()+' de '+months[d.getMonth()]+' de '+d.getFullYear();
}
function timeToMins(t) {
  if (!t) return 0;
  var p = t.split(':'); return parseInt(p[0])*60 + parseInt(p[1]||0);
}
function isSlotTaken(dateStr, timeStr, slotDur) {
  slotDur = slotDur || 30;
  var slotStart = timeToMins(timeStr);
  var slotEnd = slotStart + slotDur;
  return state.bookedSlots.some(function(b) {
    if (b.Fecha !== dateStr) return false;
    var bStart = timeToMins(b.Hora);
    var durStr = b['Duración'] || b.Duracion || '60 min';
    var bDur = parseInt(durStr) || 60;
    var bEnd = bStart + bDur;
    // overlap: slot starts before booking ends AND slot ends after booking starts
    return slotStart < bEnd && slotEnd > bStart;
  });
}
function isDayBlocked(dateStr) {
  return state.blockedDays.indexOf(dateStr) >= 0;
}
function isDayOpen(dow){ return (CONFIG.schedule[dow]||[]).length > 0; }

function isDayFull(dateStr) {
  var slots = getSlots(dateStr, state.services.reduce(function(a,s){return a+s.duration;},0) || 30);
  return slots.length === 0;
}
function getSlots(dateStr, dur) {
  var slots=[], dow=new Date(dateStr+'T12:00:00').getDay(), ranges=CONFIG.schedule[dow]||[];
  // Si es hoy, no mostrar horas pasadas
  var now = new Date();
  var todayStr = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  var nowMins = (dateStr === todayStr) ? now.getHours()*60 + now.getMinutes() : 0;

  // Bloqueo parcial de mañana/tarde (mañana = antes de 14:00, tarde = desde 14:00)
  var amBlocked = state.blockedDays.indexOf(dateStr+'_AM') >= 0;
  var pmBlocked = state.blockedDays.indexOf(dateStr+'_PM') >= 0;
  var SPLIT = 14*60; // 14:00 divide mañana/tarde

  var STEP = 30; // mostrar siempre huecos cada 30 minutos

  for (var r=0;r<ranges.length;r++) {
    var rangeStart=ranges[r][0], rangeEnd=ranges[r][1];

    // Si toda la franja está en la mañana y la mañana está bloqueada, saltar
    if (amBlocked && rangeEnd <= SPLIT) continue;
    // Si toda la franja está en la tarde y la tarde está bloqueada, saltar
    if (pmBlocked && rangeStart >= SPLIT) continue;
    // Si la franja cruza el mediodía y una mitad está bloqueada, recortar
    if (amBlocked && rangeStart < SPLIT) rangeStart = SPLIT;
    if (pmBlocked && rangeEnd > SPLIT) rangeEnd = SPLIT;
    if (rangeStart >= rangeEnd) continue;

    var cur = rangeStart;
    while (cur + dur <= rangeEnd) {
      if (cur >= nowMins) {
        var t = pad(Math.floor(cur/60))+':'+pad(cur%60);
        slots.push({time:t, taken:isSlotTaken(dateStr,t,dur)});
      }
      cur += STEP;
    }
  }

  slots.sort(function(a,b){ return timeToMins(a.time)-timeToMins(b.time); });
  return slots;
}

function bnChange(delta) {
  var newVal = (state.brokenNails || 0) + delta;
  if (newVal < 0) newVal = 0;
  if (newVal > 10) newVal = 10;
  state.brokenNails = newVal;
  render();
}
function bnClose() {
  state.showBrokenModal = false;
  render();
}

function render() {
  document.querySelectorAll('.step').forEach(function(el){
    var s=parseInt(el.dataset.step);
    el.className='step'+(s===state.step?' active':'')+(s<state.step?' done':'');

  else if (state.step===2) app.innerHTML=renderStep2();
  else if (state.step===3) app.innerHTML=renderStep3();
  else if (state.step===4) app.innerHTML=renderStep4();
  else app.innerHTML=renderSuccess();
  bind();
}

function renderStep1() {
  var btns=CONFIG.services.map(function(s){
    var sel=state.services.some(function(x){return x.id===s.id;})?' selected':'';
    return '<button class="service-btn'+sel+'" data-sid="'+s.id+'"><div class="service-name">'+s.name+'</div><div class="service-detail">'+s.desc+(s.duration>0?' · '+s.duration+' min':'')+'</div><div class="service-price">'+s.price+'</div></button>';
  }).join('');

  var hasSemi = state.services.some(function(s){ return s.id==='semi'; });
  var totalDur = state.services.reduce(function(a,s){return a+s.duration;},0);
  if (hasSemi && state.brokenNails > 4) totalDur += 15;
  var totalPrice = state.services.map(function(s){return s.price;}).join(' + ');
  if (state.brokenNails > 0) totalPrice += ' + '+state.brokenNails+'€ (uñas rotas)';

  var summaryHtml = state.services.length > 0
    ? '<div style="margin-top:1rem;background:var(--light-gray);border-radius:10px;padding:0.8rem 1rem;font-size:0.82rem;">'
      +'<strong>Seleccionados:</strong> '+state.services.map(function(s){return s.name;}).join(', ')
      +(state.brokenNails>0?' + '+state.brokenNails+' uña(s) rota(s) (+'+state.brokenNails+'€)':'')
      +(hasSemi?'&nbsp;&nbsp;<span style="color:var(--rose);cursor:pointer;text-decoration:underline;" id="editBnLink">✏️ Editar</span>':'')
      +'<br><strong>Duración total:</strong> '+totalDur+' min &nbsp;·&nbsp; <strong>Total:</strong> '+totalPrice
      +'</div>'
    : '';

  var modalHtml = state.showBrokenModal ? renderBrokenModal() : '';

  return '<div class="card"><div class="card-title">Elige tus servicios<small>Puedes seleccionar más de uno</small></div><div class="services-grid">'+btns+'</div>'
    +summaryHtml
    +'<div style="margin-top:1.5rem"><button class="btn-primary" id="btn1"'+(state.services.length?'':' disabled')+'>Continuar →</button></div></div>'
    +modalHtml;
}

function renderBrokenModal() {
  var bn = state.brokenNails || 0;
  var costText = bn > 0 ? bn+'€ extra' + (bn > 4 ? ' + 15 min' : '') : 'Sin coste extra';
  return '<div class="broken-modal-bg" id="brokenModalBg">'
    +'<div class="broken-modal">'
    +'<div class="broken-modal-title">🔨 ¿Tienes alguna uña rota?</div>'
    +'<div class="broken-modal-sub">Cada uña rota tiene un coste de 1€.<br>Si son más de 4, se añaden 15 min a tu cita.</div>'
    +'<div class="bn-counter">'
    +'<button class="bn-btn" onclick="bnChange(-1)">−</button>'
    +'<div class="bn-num">'+bn+'</div>'
    +'<button class="bn-btn" onclick="bnChange(1)">+</button>'
    +'</div>'
    +'<div class="bn-cost">'+costText+'</div>'
    +'<button class="btn-primary" onclick="bnClose()">Confirmar</button>'
    +'</div></div>';
}

function renderStep2() {
  var today=new Date(); today.setHours(0,0,0,0);
  var maxD=new Date(today); maxD.setDate(maxD.getDate()+CONFIG.maxAdvanceDays);
  var mNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var dNames=['D','L','M','X','J','V','S'];
  var firstDay=new Date(state.year,state.month,1).getDay();
  var daysInM=new Date(state.year,state.month+1,0).getDate();
  var cells='';
  for (var i=0;i<firstDay;i++) cells+='<div class="cal-day empty"></div>';
  for (var d=1;d<=daysInM;d++) {
    var date=new Date(state.year,state.month,d);
    var ds=state.year+'-'+pad(state.month+1)+'-'+pad(d);
    var blocked=isDayBlocked(ds);
    var unavail=date<today||date>maxD||!isDayOpen(date.getDay())||blocked;
    var cls='cal-day'+(unavail?(blocked?' blocked':' past'):' available');
    if (date.getTime()===today.getTime()) cls+=' today';
    if (state.date===ds) cls+=' selected';
    cells+='<div class="'+cls+'"'+(unavail?'':' data-date="'+ds+'"')+'>'+d+'</div>';
  }
  var slotsHtml='';
  if (state.date) {
    var totalDur=state.services.reduce(function(a,s){return a+s.duration;},0); var slots=getSlots(state.date,totalDur);
    if (!slots.length) {
      slotsHtml='<div class="no-slots">No hay huecos disponibles este día.</div>';
    } else {
      var sBtns=slots.map(function(s){
        if (s.taken) return '<button class="slot-btn taken" disabled>'+s.time+'<br><span style="font-size:0.65rem">Ocupado</span></button>';
        return '<button class="slot-btn'+(state.time===s.time?' selected':'')+'" data-time="'+s.time+'">'+s.time+'</button>';
      }).join('');
      slotsHtml='<div class="card-title" style="margin-top:1.5rem;font-size:1.1rem">Elige la hora</div><div class="slots-grid">'+sBtns+'</div>';
    }
  }
  return '<div class="card"><div class="card-title">Elige tu fecha<small>Días disponibles según tu horario</small></div>'
    +'<div class="calendar-header"><button class="nav-btn" id="prevM">‹</button><div class="month-title">'+mNames[state.month]+' '+state.year+'</div><button class="nav-btn" id="nextM">›</button></div>'
    +'<div class="calendar-grid">'+dNames.map(function(n){return '<div class="cal-day-name">'+n+'</div>';}).join('')+cells+'</div>'
    +slotsHtml
    +'<div style="margin-top:1.5rem"><button class="btn-primary" id="btn2"'+((state.date&&state.time)?'':' disabled')+'>Continuar →</button><button class="btn-secondary" id="back2">← Volver</button></div></div>';
}

function renderStep3() {
  return '<div class="card"><div class="card-title">Tus datos<small>Para confirmar y recordarte la cita</small></div>'
    +'<div class="form-row"><label class="form-label">Nombre y apellidos *</label><input class="form-input" id="iName" type="text" placeholder="Ej: Laura García" value="'+state.name+'" maxlength="60"></div>'
    +'<div class="form-row"><label class="form-label">Teléfono (WhatsApp) *</label><input class="form-input" id="iPhone" type="tel" placeholder="Ej: 612 345 678" value="'+state.phone+'" maxlength="20"></div>'
    +'<div class="form-row"><label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.85rem;color:var(--espresso)"><input type="checkbox" id="iFirstTime" '+(state.firstTime?'checked':'')+' style="width:18px;height:18px;accent-color:var(--rose)"> ✨ Es mi primera vez contigo</label></div>'
    +'<div class="form-row"><label class="form-label">¿Algo que deba saber? (opcional)</label><textarea class="form-input" id="iNotes" placeholder="Alergias, preferencias de color...">'+state.notes+'</textarea></div>'
    +'<div class="info-banner"><strong>📋 Política de cancelación:</strong> Si necesitas cancelar o cambiar tu cita, avísame con al menos <strong>24 horas de antelación</strong> por WhatsApp. Las inasistencias repetidas sin aviso pueden afectar a futuras reservas. ¡Gracias por tu comprensión! 💕</div>'
    +'<div class="info-banner" style="margin-top:0.6rem"><strong>⏰ Puntualidad:</strong> Si llegas con más de 15 minutos de retraso, puede que tengamos que reprogramar tu cita para no afectar a otras clientas.</div>'
    +'<div class="info-banner" style="margin-top:0.6rem"><strong>📱 Confirmación:</strong> Al confirmar recibirás un resumen para enviarme por WhatsApp.</div>'
    +'<div style="margin-top:1.5rem"><button class="btn-primary" id="btn3">Revisar cita →</button><button class="btn-secondary" id="back3">← Volver</button></div></div>';
}

function renderStep4() {
  var d=new Date(state.date+'T12:00:00');
  var svcNames=state.services.map(function(s){return s.name;}).join(' + ');
  var totalDur=state.services.reduce(function(a,s){return a+s.duration;},0);
  var totalPrice=state.services.reduce(function(sum,s){
    var n = parseFloat((s.price.match(/[\d.,]+/)||['0'])[0].replace(',','.'));
    return sum+n;
  },0);
  var bnExtra = state.brokenNails > 0 ? state.brokenNails+'€ extra ('+state.brokenNails+' uña(s) rota(s))' : '';
  if (state.brokenNails > 4) totalDur += 15;
  var rows=[['Servicios',svcNames],['Duración',totalDur+' min'],['Fecha',formatDate(d)],['Hora',state.time],['Nombre',state.name],['Teléfono',state.phone]];
  if (bnExtra) rows.push(['Uñas rotas', bnExtra]);
  if (state.firstTime) rows.push(['Primera vez','✨ Sí']);
  if (state.notes) rows.push(['Notas',state.notes]);
  return '<div class="card"><div class="card-title">Confirmar cita<small>Revisa los detalles antes de reservar</small></div>'
    +'<div class="summary-block">'+rows.map(function(r){return '<div class="summary-row"><span class="sum-label">'+r[0]+'</span><span class="sum-value">'+r[1]+'</span></div>';}).join('')+'</div>'
    +'<div style="text-align:center;background:linear-gradient(135deg,#FFF4F8,#FAF0FF);border:1.5px solid var(--blush);border-radius:14px;padding:1.2rem;margin-bottom:1.2rem;">'
    +'<div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--warm-gray);margin-bottom:0.3rem;">Total a pagar</div>'
    +'<div style="font-family:Cormorant Garamond,serif;font-size:2.4rem;font-weight:400;color:var(--rose);">'+totalPrice.toFixed(0).replace('.0','')+'€</div>'
    +'</div>'
    +'<button class="btn-primary" id="btnConfirm">✓ Confirmar reserva</button><button class="btn-secondary" id="back4">← Volver</button></div>';
}

function renderSuccess() {
  var d=new Date(state.date+'T12:00:00');
  var svcNames=state.services.map(function(s){return s.name;}).join(' + ');
  var msg=encodeURIComponent('¡Hola! Acabo de reservar una cita 💅\n\n📋 Servicio: '+svcNames+'\n📅 Fecha: '+formatDate(d)+'\n⏰ Hora: '+state.time+'\n👤 Nombre: '+state.name+'\n📱 Tel: '+state.phone+(state.notes?'\n📝 Notas: '+state.notes:'')+'\n\n¡Nos vemos pronto! ✨');
  var welcomeMsg = state.firstTime ? '<p style="font-size:0.85rem;color:var(--rose);margin-bottom:0.8rem;">✨ ¡Qué ilusión tenerte por primera vez! Te vamos a cuidar muy bien 💕</p>' : '';
  return '<div class="card success-screen"><div class="success-icon">✓</div><div class="success-title">¡Reserva confirmada!</div>'
    +welcomeMsg
    +'<p class="success-sub">Tu cita ha quedado reservada para el<br><strong>'+formatDate(d)+' a las '+state.time+'</strong><br><br>Te esperamos con mucha ilusión 💅</p>'
    +'<a href="https://wa.me/'+WHATSAPP+'?text='+msg+'" target="_blank" class="whatsapp-btn">💬 Confirmar por WhatsApp</a>'
    +'<div style="margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid var(--light-gray);">'
    +'<p style="font-size:0.8rem;color:var(--warm-gray);margin-bottom:0.6rem;">📷 ¡Comparte tu look en Instagram y etiquétanos!</p>'
    +'<a href="https://instagram.com/nailglam.estefania" target="_blank" class="ig-link">Síguenos @nailglam.estefania</a>'
    +'</div>'
    +'<button class="btn-secondary" id="btnNew" style="margin-top:1rem">Hacer otra reserva</button></div>';
}

function bind() {
  // Servicios "base" alternativos entre sí: solo uno de estos a la vez
  var BASE_SERVICES = ['semi','gel','acrigel','relleno-acri'];
  var DECO_SERVICES = ['deco-basic','deco-mid','deco-full'];
  document.querySelectorAll('.service-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var svc=CONFIG.services.find(function(s){return s.id===btn.dataset.sid;});
      var idx=state.services.findIndex(function(s){return s.id===svc.id;});
      if (idx>=0) {
        state.services.splice(idx,1);
      } else {
        if (BASE_SERVICES.indexOf(svc.id)>=0) {
          var otherBase = state.services.find(function(s){ return BASE_SERVICES.indexOf(s.id)>=0; });
          if (otherBase) {
            alert('"'+svc.name+'" y "'+otherBase.name+'" son servicios alternativos, solo puedes elegir uno de los dos. Si quieres cambiar, primero quita "'+otherBase.name+'".');
            return;
          }
        }
        if (DECO_SERVICES.indexOf(svc.id)>=0) {
          var otherDeco = state.services.find(function(s){ return DECO_SERVICES.indexOf(s.id)>=0; });
          if (otherDeco) {
            alert('Solo puedes elegir un nivel de decoración. Si quieres cambiar, primero quita "'+otherDeco.name+'".');
            return;
          }
        }
        state.services.push(svc);
        // Show broken nails modal when semi is selected
        if (svc.id === 'semi') {
          state.showBrokenModal = true;
        }
      }
      state.date=null; state.time=null;
      render();
    });
  });
  // Broken nails modal
  var bnMinus = document.getElementById('bnMinus');
  if (bnMinus) bnMinus.addEventListener('click', function(){
    if (state.brokenNails > 0) { state.brokenNails--; render(); }
  });
  var bnPlus = document.getElementById('bnPlus');
  if (bnPlus) bnPlus.addEventListener('click', function(){
    if (state.brokenNails < 10) { state.brokenNails++; render(); }
  });
  var bnConfirm = document.getElementById('bnConfirm');
  if (bnConfirm) bnConfirm.addEventListener('click', function(){
    state.showBrokenModal = false; render();
  });
  var editBnLink = document.getElementById('editBnLink');
  if (editBnLink) editBnLink.addEventListener('click', function(){
    state.showBrokenModal = true; render();
  });

  var b1=document.getElementById('btn1');
  if (b1) b1.addEventListener('click',function(){
    loadData(function(){ state.step=2; render(); });
  });
  var pm=document.getElementById('prevM');
  if (pm) pm.addEventListener('click',function(){ if(state.month===0){state.month=11;state.year--;}else state.month--; render(); });
  var nm=document.getElementById('nextM');
  if (nm) nm.addEventListener('click',function(){ if(state.month===11){state.month=0;state.year++;}else state.month++; render(); });
  document.querySelectorAll('.cal-day[data-date]').forEach(function(el){
    el.addEventListener('click',function(){ state.date=el.dataset.date; state.time=null; render(); });
  });
  document.querySelectorAll('.slot-btn[data-time]').forEach(function(el){
    el.addEventListener('click',function(){ state.time=el.dataset.time; render(); });
  });
  var wlBtn = document.getElementById('waitlistBtn');
  if (wlBtn) wlBtn.addEventListener('click', function(){
    var d = new Date(state.date+'T12:00:00');
    var svcNames = state.services.map(function(s){return s.name;}).join(' + ') || '(sin especificar)';
    var msg = encodeURIComponent('¡Hola! 💅 El día '+formatDate(d)+' está completo, pero me gustaría apuntarme a la lista de espera para ese día. Servicios que me interesan: '+svcNames+'. ¡Avísame si se libera un hueco! Gracias ✨');
    window.open('https://wa.me/'+WHATSAPP+'?text='+msg, '_blank');
  });
  var b2=document.getElementById('btn2');
  if (b2) b2.addEventListener('click',function(){ state.step=3; render(); });
  var bk2=document.getElementById('back2');
  if (bk2) bk2.addEventListener('click',function(){ state.step=1; render(); });
  var b3=document.getElementById('btn3');
  if (b3) b3.addEventListener('click',function(){
    var n=document.getElementById('iName').value.trim();
    var p=document.getElementById('iPhone').value.trim();
    if (!n||!p){ alert('Por favor, rellena tu nombre y teléfono.'); return; }
    state.name=n; state.phone=p; state.notes=document.getElementById('iNotes').value.trim();
    state.firstTime=document.getElementById('iFirstTime').checked;

    // Check for existing active appointment with same phone, in the future
    var today = new Date(); today.setHours(0,0,0,0);
    var todayStr = today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());
    var phoneDigits = p.replace(/\D/g,'');
    var existing = state.bookedSlots.find(function(b){
      var bTel = (b['Teléfono']||b.Telefono||'').replace(/\D/g,'');
      return bTel === phoneDigits && b.Fecha >= todayStr && b.Estado !== 'cancelada';
    });

    if (existing) {
      var msg = '⚠️ Ya tienes una cita pendiente el '+existing.Fecha+' a las '+existing.Hora+' ('+existing.Servicio+').\n\n'
        +'Si quieres cambiarla, primero cancela esa cita escribiéndome por WhatsApp, y luego reserva la nueva.\n\n'
        +'¿Quieres continuar igualmente y reservar otra cita adicional?';
      if (!confirm(msg)) return;
    }

    state.step=4; render();
  });
  var bk3=document.getElementById('back3');
  if (bk3) bk3.addEventListener('click',function(){ state.step=2; render(); });
  var bc=document.getElementById('btnConfirm');
  if (bc) bc.addEventListener('click',function(){
    if (isSlotTaken(state.date,state.time)){
      alert('¡Vaya! Alguien acaba de reservar ese horario. Por favor elige otro.');
      state.time=null; state.step=2; render(); return;
    }
    var svcNames=state.services.map(function(s){return s.name;}).join(' + ');
    var svcPrices=state.services.map(function(s){return s.price;}).join(' + ');
    var totalDur=state.services.reduce(function(a,s){return a+s.duration;},0);
    showLoading(true);
    fetch(SHEETDB_URL, {
      method:'POST',
      headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
      body: JSON.stringify({data: {
        ID: Date.now(),
        Fecha: state.date,
        Hora: state.time,
        Servicio: svcNames,
        Precio: svcPrices,
        'Duración': totalDur+' min',
        Nombre: state.name,
        'Teléfono': state.phone,
        Notas: (state.firstTime ? '✨ Primera vez. ' : '') + (state.brokenNails>0 ? '🔨 '+state.brokenNails+' uña(s) rota(s). ' : '') + state.notes,
        'Reservada el': new Date().toLocaleString('es-ES'),
        Estado: 'confirmada'
      }})
    })
    .then(function(){ showLoading(false); state.step=5; render(); })
    .catch(function(){ showLoading(false); state.step=5; render(); });
  });
  var bk4=document.getElementById('back4');
  if (bk4) bk4.addEventListener('click',function(){ state.step=3; render(); });
  var bn=document.getElementById('btnNew');
  if (bn) bn.addEventListener('click',function(){
    state.step=1; state.services=[]; state.date=null; state.time=null; state.name=''; state.phone=''; state.notes=''; state.firstTime=false; state.brokenNails=0; state.showBrokenModal=false;
    render();
  });
}

function renderWelcomeModal() {
  return '<div class="welcome-modal-bg" id="welcomeModalBg">'
    +'<div class="welcome-modal">'
    +'<div class="welcome-modal-icon">💅✨</div>'
    +'<div class="welcome-modal-title">¡Bienvenida a Nail Glam Estefania!</div>'
    +'<div class="welcome-modal-text">'
    +'Reservar tu cita es muy fácil:<br><br>'
    +'<strong>1.</strong> Elige el servicio o servicios que quieres<br>'
    +'<strong>2.</strong> Selecciona el día y la hora que mejor te venga<br>'
    +'<strong>3.</strong> Rellena tus datos y confirma<br><br>'
    +'¡Y listo! Te espero con muchas ganas 💕'
    +'</div>'
    +'<button class="btn-primary" id="closeWelcomeBtn">Empezar a reservar</button>'
    +'<a href="https://instagram.com/nailglam.estefania" target="_blank" class="ig-link">📷 Síguenos en Instagram</a>'
    +'</div></div>';
}

function checkWelcome() {
  try {
    if (!localStorage.getItem('nailglam_visited')) {
      var div = document.createElement('div');
      div.innerHTML = renderWelcomeModal();
      document.body.appendChild(div.firstChild);
      document.getElementById('closeWelcomeBtn').addEventListener('click', function(){
        localStorage.setItem('nailglam_visited', '1');
        document.getElementById('welcomeModalBg').remove();
      });
    }
  } catch(e) { /* localStorage not available, skip */ }
}

render();
checkWelcome();
</script>
</body>
</html>
